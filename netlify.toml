[build]
publish = "."
command = ""

[build.environment]
NODE_VERSION = "18"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/*"
[headers.values]
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/assets/images/*"
[headers.values]
Cache-Control = "public, max-age=31536000"

[[headers]]
for = "/assets/videos/*"
[headers.values]
Cache-Control = "public, max-age=31536000"